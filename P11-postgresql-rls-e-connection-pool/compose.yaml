name: p11-tenant-context

services:
  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: tenant_lab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:55441:5432"
    volumes:
      - p11_postgres_data:/var/lib/postgresql/data
      - ./sql/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenant_lab"]
      interval: 1s
      timeout: 3s
      retries: 20

volumes:
  p11_postgres_data:
