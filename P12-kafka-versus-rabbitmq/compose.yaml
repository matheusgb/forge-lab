services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.18
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:19092
    ports:
      - "127.0.0.1:19092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health -X brokers=localhost:9092 | grep -q 'Healthy: *true'"]
      interval: 2s
      timeout: 2s
      retries: 30

  rabbitmq:
    image: rabbitmq:4.1.0-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: forge
      RABBITMQ_DEFAULT_PASS: forge-secret
    ports:
      - "127.0.0.1:5673:5672"
      - "127.0.0.1:15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
