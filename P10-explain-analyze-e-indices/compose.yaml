services:
  postgres:
    image: postgres:17.5-alpine3.22
    environment:
      POSTGRES_DB: query_clinic
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: clinic
    ports:
      - "127.0.0.1:55440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic -d query_clinic"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
